<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi Novia</title>
    <style>
        /* Estilos generales */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffebee;
            margin: 0;
            font-family: 'Arial', sans-serif;
        }

        /* Contenedor del corazón */
        .heart-container {
            position: relative;
            text-align: center;
        }

        /* Corazón */
        .heart {
            width: 100px;
            height: 90px;
            background-color: red;
            position: relative;
            transform: rotate(-45deg);
            animation: beat 1s infinite;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .heart::before,
        .heart::after {
            content: '';
            width: 100px;
            height: 90px;
            background-color: red;
            border-radius: 50%;
            position: absolute;
        }

        .heart::before {
            top: -45px;
            left: 0;
        }

        .heart::after {
            top: 0;
            left: 45px;
        }

        /* Flecha que atraviesa el corazón */
        .arrow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120px;
            height: 2px;
            background-color: white;
            transform: translate(-50%, -50%) rotate(-45deg);
            transform-origin: center;
            z-index: 1;
        }

        .arrow::before {
            content: '';
            position: absolute;
            top: -5px;
            right: 0;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 5px 0 5px 10px;
            border-color: transparent transparent transparent white;
        }

        /* Mensajes */
        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            color: white;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Efecto de clic */
        #heart-checkbox {
            display: none;
        }

        #heart-checkbox:checked ~ .heart {
            background-color: #ff6b6b;
        }

        #heart-checkbox:checked ~ .arrow {
            opacity: 0;
        }

        #heart-checkbox:checked ~ .heart .press-me {
            opacity: 0;
        }

        #heart-checkbox:checked ~ .heart .love-message {
            opacity: 1;
        }

        /* Animación de latido */
        @keyframes beat {
            0%, 100% {
                transform: rotate(-45deg) scale(1);
            }
            50% {
                transform: rotate(-45deg) scale(1.1);
            }
        }
    </style>
</head>
<body>
    <div class="heart-container">
        <!-- Checkbox invisible para simular el clic -->
        <input type="checkbox" id="heart-checkbox">

        <!-- Flecha que atraviesa el corazón -->
        <div class="arrow"></div>

        <!-- Corazón -->
        <label for="heart-checkbox" class="heart">
            <div class="message press-me">Presióname</div>
            <div class="message love-message">Te quiero lamber tu cola</div>
        </label>
    </div>
</body>
</html>
